name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  marketplace-lint:
    name: Marketplace lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate marketplace manifest
        run: |
          python3 - <<'PY'
          import json, re, sys
          mp = json.load(open('.claude-plugin/marketplace.json'))
          assert 'name' in mp and 'plugins' in mp, 'missing marketplace fields'
          failures = []
          for p in mp['plugins']:
              for f in ('name', 'source', 'description'):
                  if f not in p:
                      failures.append(f"plugin entry missing {f!r}: {p.get('name', p)}")
              src = p.get('source')
              if not isinstance(src, dict) or src.get('source') != 'github':
                  failures.append(f"{p.get('name')}: source must be an external github reference, got {src!r}")
              elif not re.fullmatch(r'[\w.-]+/[\w.-]+', src.get('repo', '')):
                  failures.append(f"{p.get('name')}: source.repo must be 'owner/repo', got {src.get('repo')!r}")
              else:
                  print(f"ok: {p['name']} -> {src['repo']}")
          if failures:
              for f in failures:
                  print(f"FAIL: {f}", file=sys.stderr)
              sys.exit(1)
          print(f"ok: marketplace lists {[p['name'] for p in mp['plugins']]}")
          PY
